<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Circle Alpha | OCA Airdrop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <div class="brand">
      <img src="images/logo.png" alt="One Circle Alpha Logo" />
    </div>

    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#" class="active">Airdrop</a>
      <a href="#">About</a>
      <a href="#">Tokenomics</a>
      <a href="#">Roadmap</a>
      <a href="#">FAQ</a>
    </nav>

    <button id="connectTop" class="connect-btn">Connect Wallet</button>
  </header>

  <main class="hero">
    <h1><span>$OCA</span> <strong>Airdrop</strong> Claim</h1>
    <p class="subtitle">$OCA is the native token of <span>One Alpha Circle.</span></p>

    <section class="claim-card">
      <h2>Claim <span>$OCA</span> Token</h2>
      <p>Connect your wallet to view eligibility and claim $OCA.</p>

      <button id="connectMain" class="main-btn">Connect Wallet</button>

      <div id="resultBox" class="result-box">
        <p id="walletText">Wallet: Not connected</p>
        <p id="statusText">Status: Waiting</p>
        <p id="amountText">Claimable: 0 OCA</p>
      </div>

      <button id="claimBtn" class="claim-btn" disabled>Claim OCA</button>
    </section>

    <div class="big-logo">
      <img src="images/logo.png" alt="One Circle Alpha Logo" />
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
